<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Dashboard | Ravenshaw Alumni Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <i class="fa-solid fa-graduation-cap"></i> 
                <span class="brand-uni">Ravenshaw</span> 
                <span class="brand-app">Alumni Connect</span>
            </a>
            <div class="user-profile-nav">
                <span id="userNameDisplay">Loading...</span>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="welcome-banner alumni-banner">
            <h1>Welcome back, <span id="alumniName">Alumnus</span> 🌟</h1>
            <p><span id="alumniRole">Software Engineer</span> at <span id="alumniCompany">Tech Corp</span></p>
        </div>

        <div class="dashboard-grid">
            <div class="dashboard-card">
                <i class="fa-solid fa-plus-circle icon-blue"></i>
                <h3>Post a Job / Internship</h3>
                <p>Help your juniors by sharing career opportunities in your company.</p>
                <button class="btn btn-primary" onclick="togglePostJobForm()">+ Post Opportunity</button>
            </div>
        </div>

        <!-- POST JOB FORM SECTION -->
        <section id="postJobSection" class="dashboard-section hidden">
            <hr class="section-divider">
            <h2><i class="fa-solid fa-file-circle-plus"></i> Share a New Career Opportunity</h2>
            <form id="postJobForm" class="job-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Job Title</label>
                        <input type="text" id="jobTitle" placeholder="e.g. Frontend Developer" required>
                    </div>
                    <div class="form-group">
                        <label>Company</label>
                        <input type="text" id="jobCompany" placeholder="e.g. TCS / Wipro" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Opportunity Type</label>
                        <select id="jobType" required>
                            <option value="Full-Time Job">Full-Time Job</option>
                            <option value="Internship">Internship</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="jobLocation" placeholder="e.g. Bhubaneswar / Remote">
                    </div>
                </div>
                <div class="form-group">
                    <label>Application Link / Referral Email</label>
                    <input type="text" id="jobApplyLink" placeholder="e.g. https://company.careers/job or referral email">
                </div>
                <div class="form-group">
                    <label>Job Description</label>
                    <textarea id="jobDescription" rows="4" placeholder="Brief requirements, skills needed..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Publish Opportunity</button>
                <p id="jobMsg" class="msg-box"></p>
            </form>
        </section>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
