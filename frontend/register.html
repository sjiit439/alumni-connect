<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Ravenshaw Alumni Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

    <div id="successModal" class="modal-overlay hidden" style="display: none;">
        <div class="modal-card">
            <div class="modal-icon text-green">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h3>Registration Successful!</h3>
            <p id="modalMsg">Your account has been registered successfully.</p>
            <button class="btn btn-primary modal-btn" onclick="redirectToLogin()">Go to Login</button>
        </div>
    </div>

    <div class="auth-card">
        <a href="index.html" class="logo auth-logo">
            <i class="fa-solid fa-graduation-cap"></i> 
            <span class="brand-uni">Ravenshaw</span> 
            <span class="brand-app">Alumni Connect</span>
        </a>
        
        <h2>Create an Account</h2>
        <p class="auth-subtitle">Join the Ravenshaw network today</p>

        <form id="registerForm">
            <div class="form-group">
                <label>I am a:</label>
                <select id="role" onchange="toggleAlumniFields()" required>
                    <option value="student">Student</option>
                    <option value="alumni">Alumnus / Alumni</option>
                </select>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="e.g. Rahul Sharma" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="student@ravenshaw.ac.in" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Course</label>
                    <select id="course" required>
                        <option value="">Select Course</option>
                        <option value="BSc">BSc</option>
                        <option value="BA">BA</option>
                        <option value="MSc">MSc</option>
                        <option value="MA">MA</option>
                        <option value="BSc BEd">BSc BEd</option>
                        <option value="BA BEd">BA BEd</option>
                        <option value="BEd">BEd</option>
                        <option value="BCA">BCA</option>
                        <option value="MCA">MCA</option>
                        <option value="BBA">BBA</option>
                        <option value="MBA">MBA</option>
                        <option value="Phd">Phd</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="department" required>
                        <option value="">Select Dept</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Education">Education</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Statistics">Statistics</option>
                        <option value="Zoology">Zoology</option>
                        <option value="Botany">Botany</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Political Science">Political Science</option>
                        <option value="History">History</option>
                        <option value="Geography">Geography</option>
                        <option value="Odia">Odia</option>
                        <option value="Economics">Economics</option>
                        <option value="Geology">Geology</option>
                        <option value="Sociology">Sociology</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Commerce">Commerce</option>
                        <option value="English">English</option>
                        <option value="Business Administration">Business Administration</option>
                        <option value="JMC">JMC</option>
                        <option value="Philosophy">Philosophy</option>
                        <option value="Psychology">Psychology</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Batch / Passout Year</label>
                <input type="number" id="batchYear" placeholder="e.g. 2024" required>
            </div>

            <!-- Dynamic Alumni Fields -->
            <div id="alumniFields" class="hidden">
                <div class="form-row">
                    <div class="form-group">
                        <label>Current Company / Organization</label>
                        <input type="text" id="company" placeholder="e.g. TCS / Ravenshaw University">
                    </div>
                    <div class="form-group">
                        <label>Designation</label>
                        <input type="text" id="designation" placeholder="e.g. Assistant Professor / Software Developer">
                    </div>
                </div>
                <div class="form-group">
                    <label>LinkedIn Profile URL</label>
                    <input type="url" id="linkedinUrl" placeholder="https://linkedin.com/in/username">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Register</button>
            <p id="responseMsg" class="msg-box"></p>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log In</a>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
