<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Ravenshaw Alumni Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

    <div class="auth-card">
        <a href="index.html" class="logo auth-logo">
            <i class="fa-solid fa-graduation-cap"></i> 
            <span class="brand-uni">Ravenshaw</span> 
            <span class="brand-app">Alumni Connect</span>
        </a>
        
        <h2>Create an Account</h2>
        <p class="auth-subtitle">Join the Ravenshaw network today</p>

        <form id="registerForm">
            <div class="form-group">
                <label>I am a:</label>
                <select id="role" onchange="toggleAlumniFields()" required>
                    <option value="student">Student</option>
                    <option value="alumni">Alumnus / Alumni</option>
                </select>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="e.g. Rahul Sharma" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="student@ravenshaw.ac.in" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Department</label>
                    <select id="department" required>
                        <option value="">Select Dept</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Physics">Physics</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Economics">Economics</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Batch / Passout Year</label>
                    <input type="number" id="batchYear" placeholder="2026" required>
                </div>
            </div>

            <!-- Conditional Alumni Fields -->
            <div id="alumniFields" class="hidden">
                <div class="form-row">
                    <div class="form-group">
                        <label>Current Company</label>
                        <input type="text" id="company" placeholder="e.g. TCS / Google">
                    </div>
                    <div class="form-group">
                        <label>Designation</label>
                        <input type="text" id="designation" placeholder="e.g. Software Engineer">
                    </div>
                </div>
                <div class="form-group">
                    <label>LinkedIn Profile URL</label>
                    <input type="url" id="linkedinUrl" placeholder="https://linkedin.com/in/username">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Register</button>
            <p id="responseMsg" class="msg-box"></p>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log In</a>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
