<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events & News Feed | Ravenshaw Alumni Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-graduation-cap"></i> 
                <span class="brand-uni">Ravenshaw</span> 
                <span class="brand-app">Alumni Connect</span>
            </a>
            <div class="user-profile-nav">
                <button class="btn btn-secondary" onclick="goBackDashboard()">Back to Dashboard</button>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="welcome-banner alumni-banner">
            <h1>Campus Events, Webinars & News 📢</h1>
            <p>Attend alumni-hosted webinars, guidance talks, and catch up with university achievements.</p>
        </div>

        <!-- Filter Bar -->
        <div class="filter-box">
            <div class="form-row">
                <div class="form-group">
                    <label>Filter Content Type</label>
                    <select id="filterType" onchange="filterEventsFeed()">
                        <option value="">All Types (Webinars & News)</option>
                        <option value="Webinar">Webinars & Guidance Sessions</option>
                        <option value="News">Campus News</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Department Filter</label>
                    <select id="filterDept" onchange="filterEventsFeed()">
                        <option value="">All Departments</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                        <option value="Economics">Economics</option>
                        <option value="Commerce">Commerce</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="eventsContainer" class="directory-grid">
            <p>Loading events and announcements...</p>
        </div>
    </div>

    <script src="js/events.js"></script>
</body>
</html>
